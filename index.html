<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poster Atelier</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
      <aside class="sidebar">
        <div class="brand-block">
          <span class="mark"></span>
          <div>
            <p class="eyebrow">Tokyo Layout Room</p>
            <h1>日系海报排版工作台</h1>
          </div>
        </div>

        <section class="panel">
          <div class="panel-head">
            <h2>排版风格</h2>
            <span id="templateCount"></span>
          </div>
          <div class="template-list" id="templateList"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>画幅</h2>
          </div>
          <div class="segmented" id="ratioControl">
            <button class="active" data-ratio="portrait">竖版</button>
            <button data-ratio="square">方形</button>
            <button data-ratio="story">长图</button>
          </div>
          <div class="field-grid compact-grid">
            <label>
              <span>宽 px</span>
              <input id="customWidthInput" type="number" min="240" max="3000" value="1080" />
            </label>
            <label>
              <span>高 px</span>
              <input id="customHeightInput" type="number" min="240" max="4000" value="1350" />
            </label>
          </div>
          <button class="text-button full-button" id="applySizeBtn">应用自定义尺寸</button>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>图层</h2>
            <span id="activeLayerName">标题</span>
          </div>
          <div class="layer-list" id="layerList"></div>
          <button class="text-button full-button" id="deleteLayerBtn">删除选中图层</button>
        </section>
      </aside>

      <section class="stage-area">
        <header class="topbar">
          <div>
            <p class="eyebrow">实时预览</p>
            <h2 id="activeTemplateName">Shashin Margin</h2>
          </div>
          <div class="toolbar">
            <button class="icon-button" id="undoBtn" title="撤销 Cmd/Ctrl+Z">
              <span aria-hidden="true">↶</span>
            </button>
            <button class="icon-button" id="redoBtn" title="重做 Cmd/Ctrl+Shift+Z / Ctrl+Y">
              <span aria-hidden="true">↷</span>
            </button>
            <button class="icon-button" id="randomizeBtn" title="随机组合">
              <span aria-hidden="true">↻</span>
            </button>
            <button class="text-button" id="exportBtn">导出 PNG</button>
          </div>
        </header>

        <div class="canvas-wrap">
          <article class="poster template-editorial ratio-portrait" id="posterCanvas">
            <div class="poster-bg" id="posterBg" data-layer="bg"></div>
            <div class="poster-grain" data-layer="grain"></div>
            <div class="poster-art" id="posterArt" data-layer="art"></div>
            <svg class="vector-shape shape-circle" data-layer="shapeCircle" viewBox="0 0 100 100" aria-hidden="true">
              <circle cx="50" cy="50" r="42"></circle>
            </svg>
            <svg class="vector-shape shape-rect" data-layer="shapeRect" viewBox="0 0 100 100" aria-hidden="true">
              <rect x="10" y="18" width="80" height="64" rx="4"></rect>
            </svg>
            <svg class="vector-shape shape-line" data-layer="shapeLine" viewBox="0 0 100 100" aria-hidden="true">
              <path d="M8 50H92"></path>
            </svg>
            <div class="poster-content">
              <p class="poster-kicker" id="posterKicker" data-layer="kicker">小さな週末</p>
              <h3 class="poster-title" id="posterTitle" data-layer="title">春日散策</h3>
              <p class="poster-subtitle" id="posterSubtitle" data-layer="subtitle">午后四点的光、街角的咖啡与慢慢经过的风。把日常放进一张安静的纸面。</p>
              <div class="poster-meta" data-layer="meta">
                <span id="posterDate">2026.06.18</span>
                <span id="posterPlace">Kichijoji</span>
              </div>
            </div>
          </article>
        </div>
      </section>

      <aside class="inspector">
        <section class="panel">
          <div class="panel-head">
            <h2>底图</h2>
          </div>
          <label class="upload-box">
            <span>上传自己的底图</span>
            <input id="imageInput" type="file" accept="image/*" />
          </label>
          <div class="background-list" id="backgroundControl"></div>
          <label>
            <span>底图明暗</span>
            <input id="imageShadeInput" type="range" min="0" max="100" value="18" />
          </label>
          <label>
            <span>底图模糊</span>
            <input id="imageBlurInput" type="range" min="0" max="100" value="0" />
          </label>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>新增元素</h2>
          </div>
          <div class="element-actions">
            <button class="mini-button" data-add-element="text">文字</button>
            <button class="mini-button" data-add-element="circle">圆形</button>
            <button class="mini-button" data-add-element="rect">矩形</button>
            <button class="mini-button" data-add-element="line">线条</button>
          </div>
          <label class="upload-box">
            <span>导入图片元素</span>
            <input id="elementInput" type="file" accept="image/*" />
          </label>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>动态海报</h2>
          </div>
          <label class="toggle-line">
            <span>开启动态预览</span>
            <input id="motionToggle" type="checkbox" />
          </label>
          <div class="segmented motion-modes" id="motionModeControl">
            <button class="active" data-motion="float">漂浮</button>
            <button data-motion="pulse">呼吸</button>
            <button data-motion="slide">横移</button>
          </div>
          <label>
            <span>速度</span>
            <input id="motionSpeedInput" type="range" min="4" max="24" value="10" />
          </label>
          <label class="upload-box">
            <span>替换动态物体</span>
            <input id="motionAssetInput" type="file" accept="image/*" />
          </label>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>内容</h2>
          </div>
          <label>
            <span>眉标</span>
            <input id="kickerInput" value="小さな週末" />
          </label>
          <label>
            <span>标题</span>
            <textarea id="titleInput" rows="3">春日散策</textarea>
          </label>
          <label>
            <span>副标题</span>
            <textarea id="subtitleInput" rows="4">午后四点的光、街角的咖啡与慢慢经过的风。把日常放进一张安静的纸面。</textarea>
          </label>
          <div class="field-grid">
            <label>
              <span>日期</span>
              <input id="dateInput" value="2026.06.18" />
            </label>
            <label>
              <span>地点</span>
              <input id="placeInput" value="Kichijoji" />
            </label>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>字体模块</h2>
          </div>
          <label class="upload-box">
            <span>导入字体文件</span>
            <input id="fontInput" type="file" accept=".ttf,.otf,.woff,.woff2,font/*" />
          </label>
          <div class="font-list" id="fontControl"></div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>选中图层细节</h2>
            <button class="mini-button" id="resetLayerBtn">重置</button>
          </div>
          <label class="toggle-line">
            <span>显示图层</span>
            <input id="layerVisibleInput" type="checkbox" checked />
          </label>
          <div class="field-grid">
            <label>
              <span>X 位置</span>
              <input id="layerXInput" type="range" min="-220" max="220" value="0" />
            </label>
            <label>
              <span>Y 位置</span>
              <input id="layerYInput" type="range" min="-220" max="220" value="0" />
            </label>
          </div>
          <div class="field-grid">
            <label>
              <span>缩放</span>
              <input id="layerScaleInput" type="range" min="40" max="180" value="100" />
            </label>
            <label>
              <span>旋转</span>
              <input id="layerRotateInput" type="range" min="-35" max="35" value="0" />
            </label>
          </div>
          <div class="field-grid">
            <label>
              <span>透明度</span>
              <input id="layerOpacityInput" type="range" min="0" max="100" value="100" />
            </label>
            <label>
              <span>层级</span>
              <input id="layerZInput" type="range" min="0" max="20" value="10" />
            </label>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>色彩与细节</h2>
          </div>
          <div class="swatches" id="paletteControl"></div>
          <div class="color-grid">
            <label>
              <span>纸张</span>
              <input id="paperColorInput" type="color" value="#fbf7ed" />
            </label>
            <label>
              <span>文字</span>
              <input id="inkColorInput" type="color" value="#2c2b27" />
            </label>
            <label>
              <span>图形</span>
              <input id="toneColorInput" type="color" value="#9cc8c2" />
            </label>
            <label>
              <span>强调</span>
              <input id="accentColorInput" type="color" value="#e86f5b" />
            </label>
          </div>
          <label>
            <span>标题强度</span>
            <input id="scaleInput" type="range" min="0" max="100" value="42" />
          </label>
          <label>
            <span>画面密度</span>
            <input id="densityInput" type="range" min="0" max="100" value="32" />
          </label>
        </section>
      </aside>
    </main>

    <script src="app.js"></script>
  </body>
</html>
